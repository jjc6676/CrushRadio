name = "crushradio"
main = "workers/main/index.built.js"
account_id = "4897a75a29edc61cdc040223058f49bc"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
preview_urls = true

routes = [
  { pattern = "crushradio.com", custom_domain = true },
  { pattern = "www.crushradio.com", custom_domain = true },
]

# State transitions are derived from UTC timestamps; the cron only acts
# when there is work to do (kick the Rotator during the live window,
# certify results after broadcast end). Runs every minute, UTC.
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "crushradio"
database_id = "79298aca-8a27-4575-947c-2f6c322d8a29"

[[kv_namespaces]]
binding = "KV"
id = "a0a85a30bb8e44069b53704d887e0e30"
preview_id = "7a73730a616a48d4b5a587fb5202fb59"

[[r2_buckets]]
binding = "AUDIO"
bucket_name = "crushradio-audio"

[durable_objects]
bindings = [
  { name = "ROTATOR", class_name = "Rotator" }
]

[[migrations]]
tag = "v1"
new_classes = ["Rotator"]
